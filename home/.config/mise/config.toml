[env]
_.path = [
    "~/code/dotfiles/bin/dotfiles",
    "~/code/dotfiles/bin/source-control",
    "~/code/dotfiles/bin/utils",
    "~/.local/bin",
    "~/.cargo/bin",
]
_.file = { path = "{{config_root}}/.config/mise/.env" }
LANG = "en_US.UTF-8"
LANGUAGE = "{{env.LANG}}"
LC_ALL = "{{env.LANG}}"
EDITOR = "code --wait"
PYTHONDONTWRITEBYTECODE = 1
HOMEBREW_NO_ANALYTICS = 1
HOMEBREW_NO_AUTO_UPDATE = 1
HOMEBREW_NO_ENV_HINTS = 1
HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK = 1
HOMEBREW_DOWNLOAD_CONCURRENCY = "auto"
UV_NATIVE_TLS = "true"
DOTFILES_ROOT = "{{env.HOME}}/code/dotfiles"
STARSHIP_LOG = "error"
LOCAL_FISH_COMPLETION_DIR = "{{config_root}}/.config/fish/completions"
COMPOSE_PROGRESS = "quiet"
PI_SKIP_VERSION_CHECK = 1
PI_TELEMETRY = 0
PI_CACHE_RETENTION = "long"

[shell_alias]
b = "brew"
m = "mise"
dco = "docker compose"
g = "git"
j = "just"
l = "ls"
po = "poetry"
py = "python3"
rmt = "trash"
c = "z"
ls = "eza --icons --all"
ll = "eza --icons --all --long"
dir-size = "du -sh"
git-root = "cd $(git rev-parse --show-toplevel)"

[hooks]
postinstall = 'mkdir -p "$LOCAL_FISH_COMPLETION_DIR"'

[tasks._install-fish-completions]
hide = true
usage = '''
arg "<command>"
arg "<completion_command>" var=#true
'''
run = '''
    ${usage_command?} ${usage_completion_command?} \
    > "$LOCAL_FISH_COMPLETION_DIR/${usage_command?}.fish"
'''

[tools]
bat = { version = "latest", postinstall = "mise run _install-fish-completions bat --completion fish" }
biome = "latest"
cargo-binstall = "latest"
delta = "latest"
fd = { version = "latest", postinstall = "mise run _install-fish-completions fd --gen-completions fish" }
fzf = "latest"
gh = { version = "latest" }
go = "latest"
helm = "latest"
helmfile = { version = "latest", postinstall = "mise run _install-fish-completions helmfile completion fish" }
hyperfine = "latest"
just = "latest"
killport = "latest"
kubectl = "latest"
glab = "latest"
node = "24"
python = [
    { version = "3.14", postinstall = "pip install mypy" },
    { version = "3.13", postinstall = "pip install mypy" },
    { version = "3.12", postinstall = "pip install mypy" },
    { version = "3.11", postinstall = "pip install mypy" },
    { version = "3.10", postinstall = "pip install mypy" },
]
ripgrep = { version = "latest", postinstall = "mise run _install-fish-completions rg --generate complete-fish" }
starship = "latest"
usage = "latest"
uv = { version = "latest", postinstall = "mise run _install-fish-completions uv generate-shell-completion fish" }
xh = { version = "latest", postinstall = "mise run _install-fish-completions xh --generate complete-fish && mkdir -p ~/.local/bin && ln (which xh) ~/.local/bin/xhs" }
yq = { version = "latest", postinstall = "mise run _install-fish-completions yq completion fish" }
zoxide = "latest"
"cargo:mergiraf" = { version = "latest", postinstall = "mergiraf languages --gitattributes > $DOTFILES_ROOT/home/.config/git/gitattributes" }
"cargo:tokei" = "latest"
"npm:@anthropic-ai/claude-code" = "latest"
"npm:confluence-cli" = "latest"
"pipx:eof-fixer" = "latest"
"pipx:maturin" = "latest"
"pipx:poetry" = { version = "latest", postinstall = "mise run _install-fish-completions poetry completions fish" }
"pipx:yt-dlp" = "latest"
"spm:sindresorhus/macos-trash" = "latest"
"github:ankitpokhrel/jira-cli" = { version = "latest", postinstall = "mise run _install-fish-completions jira completion fish" }
"pipx:ty" = "latest"
"npm:typescript-language-server" = "latest"
"npm:lean-ctx-bin" = "latest"
"npm:agent-browser" = "latest"
"github:umputun/revdiff" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"

[settings]
experimental = true
trusted_config_paths = [
    "~/.config/mise/config.toml",
    "~/.config/mise/config.local.toml",
    "~/code/dotfiles/home/.config/mise/config.toml",
    "~/code/dotfiles/home/.config/mise/config.local.toml",
]
fetch_remote_versions_cache = "2d"
fetch_remote_versions_timeout = "1s"
pipx.uvx = true
python.compile = false
cargo.binstall = true
github_attestations = false
minimum_release_age = "7d"
